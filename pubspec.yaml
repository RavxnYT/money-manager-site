name: money_management_app
description: Cross-platform money management app with Supabase backend.
publish_to: "none"
version: 1.0.0+8

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.1
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  app_links: ^7.0.0
  google_mobile_ads: ^7.0.0
  connectivity_plus: ^7.1.0
  fl_chart: ^1.2.0
  purchases_flutter: ^9.16.0
  purchases_ui_flutter: ^9.16.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.5
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "download.jpg"
  remove_alpha_ios: true

# Upstream flutter_local_notifications_windows builds C++ that needs MSVC ATL
# (atlbase.h). This app does not use local notifications on Windows.
dependency_overrides:
  flutter_local_notifications_windows:
    path: packages/flutter_local_notifications_windows